{% extends "base.html" %}
{% block title %}Nueva contraseña{% endblock %}
{% block content %}
<section class="auth-page auth-page-admin">
  <div class="auth-card auth-card-admin-only">
    <div class="auth-card-body">
      <span class="section-eyebrow">Nueva contraseña</span>
      <h1>Define una contraseña nueva</h1>
      <p>La nueva clave debe tener al menos 8 caracteres.</p>
      <form method="post" class="auth-form" data-auth-validate="reset" novalidate>
        <div class="form-group form-group-password">
          <label for="new_password">Nueva contraseña</label>
          <div class="password-wrap">
            <input type="password" id="new_password" name="new_password" placeholder="Mínimo 8 caracteres" autocomplete="new-password" minlength="8" required>
            <button class="password-toggle" type="button" data-toggle-password="#new_password">Ver</button>
          </div>
        </div>
        <div class="form-group form-group-password">
          <label for="confirm_new_password">Confirmar nueva contraseña</label>
          <div class="password-wrap">
            <input type="password" id="confirm_new_password" name="confirm_new_password" placeholder="Repite la nueva contraseña" autocomplete="new-password" minlength="8" required>
            <button class="password-toggle" type="button" data-toggle-password="#confirm_new_password">Ver</button>
          </div>
        </div>
        <div class="form-inline-error" data-form-error></div>
        <button type="submit" class="button button-full">Guardar nueva contraseña</button>
      </form>
    </div>
  </div>
</section>
{% endblock %}
{% block page_scripts %}
<script src="{{ url_for('static', filename='js/auth.js') }}"></script>
{% endblock %}
