{% extends "base.html" %}
{% block title %}Registrarse{% endblock %}

{% block content %}
<section class="auth-page">
  <div class="container">
    <div class="auth-card">
      <div class="auth-header">
        <span class="section-badge">Registro</span>
        <h1>Crea tu cuenta</h1>
        <p>
          Regístrate para comenzar a gestionar tu invitación, guardar tus datos y continuar con tu evento desde tu panel.
        </p>
      </div>

      <form method="post" class="auth-form" novalidate>
        <div class="form-group">
          <label for="full_name">Nombre completo</label>
          <input
            id="full_name"
            name="full_name"
            type="text"
            value="{{ request.form.get('full_name', '') }}"
            placeholder="Tu nombre y apellido"
            autocomplete="name"
            required
          >
        </div>

        <div class="form-group">
          <label for="email">Correo electrónico</label>
          <input
            id="email"
            name="email"
            type="email"
            value="{{ request.form.get('email', '') }}"
            placeholder="tuemail@dominio.com"
            autocomplete="email"
            required
          >
        </div>

        <div class="form-group">
          <label for="phone">Teléfono / WhatsApp</label>
          <input
            id="phone"
            name="phone"
            type="text"
            value="{{ request.form.get('phone', '') }}"
            placeholder="+54 9 11 0000 0000"
            autocomplete="tel"
          >
        </div>

        <div class="form-group">
          <label for="password">Contraseña</label>
          <div class="password-field">
            <input
              id="password"
              name="password"
              type="password"
              placeholder="Mínimo 8 caracteres"
              autocomplete="new-password"
              required
            >
            <button
              type="button"
              class="password-toggle"
              data-toggle-password
              data-password-target="password"
              aria-label="Mostrar u ocultar contraseña"
            >
              Ver
            </button>
          </div>
        </div>

        <div class="form-group">
          <label for="confirm_password">Confirmar contraseña</label>
          <div class="password-field">
            <input
              id="confirm_password"
              name="confirm_password"
              type="password"
              placeholder="Repite la contraseña"
              autocomplete="new-password"
              required
            >
            <button
              type="button"
              class="password-toggle"
              data-toggle-password
              data-password-target="confirm_password"
              aria-label="Mostrar u ocultar contraseña"
            >
              Ver
            </button>
          </div>
        </div>

        <label class="checkbox-inline">
          <input
            type="checkbox"
            name="accept_terms"
            value="1"
            {% if request.form.get('accept_terms') == '1' %}checked{% endif %}
          >
          <span>Acepto los términos y condiciones y la política de privacidad.</span>
        </label>

        <button type="submit" class="btn btn-primary btn-block auth-submit">
          Crear cuenta
        </button>

        <a href="{{ url_for('auth.login') }}" class="btn btn-secondary btn-block auth-secondary-action">
          Ya tengo cuenta
        </a>
      </form>
    </div>
  </div>
</section>
{% endblock %}
