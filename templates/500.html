{% extends "base.html" %}
{% block title %}Error interno{% endblock %}

{% block content %}
<section class="auth-page">
  <div class="container">
    <div class="auth-card center">
      <span class="section-badge">Error 500</span>
      <div class="auth-header">
        <h1>Error interno del sistema</h1>
        <p>
          Ocurrió un problema inesperado. El equipo puede revisarlo desde los logs del servidor.
        </p>
      </div>

      <a href="{{ url_for('public.home') }}" class="btn btn-primary btn-block">
        Volver al inicio
      </a>
    </div>
  </div>
</section>
{% endblock %}
